<!doctype html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SundayTranslate Relay</title>
    <style>
      :root {
        --ink: #0e1418;
        --ink-2: #141c22;
        --line: rgba(255, 255, 255, 0.1);
        --txt: #eef3f4;
        --dim: #93a1a8;
        --teal: #2bb3c0;
        --gold: #d4a73a;
        --ok: #3ecf8e;
        --bad: #ef6f6f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(120% 80% at 50% -10%, #16252b, var(--ink)) fixed;
        color: var(--txt); padding: 28px;
      }
      h1 { font-size: 20px; margin: 0 0 2px; }
      h1 .dim { color: var(--dim); font-weight: 500; }
      .sub { color: var(--dim); font-size: 13px; margin-bottom: 22px; }
      label { display: block; font-size: 12px; letter-spacing: .04em; text-transform: uppercase; color: var(--dim); margin: 14px 0 5px; }
      input {
        width: 100%; padding: 11px 13px; border-radius: 11px; border: 1px solid var(--line);
        background: var(--ink-2); color: var(--txt); font-size: 14px;
      }
      input:focus { outline: none; border-color: var(--teal); }
      .row { display: flex; gap: 10px; margin-top: 22px; }
      button {
        flex: 1; padding: 13px; border-radius: 11px; border: none; font-weight: 600; font-size: 15px; cursor: pointer;
        transition: transform .15s, opacity .15s;
      }
      button:active { transform: translateY(1px); }
      button:disabled { opacity: .45; cursor: default; }
      .start { background: linear-gradient(135deg, var(--teal), #1f8e99); color: #04181b; }
      .stop { background: var(--ink-2); border: 1px solid var(--line); color: var(--txt); }
      .card {
        margin-top: 22px; border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; background: rgba(255, 255, 255, 0.025);
      }
      .pill { display: inline-flex; align-items: center; gap: 8px; font-weight: 700; }
      .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--dim); }
      .dot.on { background: var(--ok); box-shadow: 0 0 10px var(--ok); }
      .kv { display: flex; justify-content: space-between; gap: 12px; font-size: 13px; margin-top: 8px; color: var(--dim); }
      .kv b { color: var(--txt); font-weight: 600; word-break: break-all; text-align: right; }
      .err { color: var(--bad); font-size: 13px; margin-top: 12px; min-height: 1em; }
      .hint { color: var(--dim); font-size: 12px; margin-top: 6px; }
    </style>
  </head>
  <body>
    <h1>SundayTranslate <span class="dim">Relay</span></h1>
    <div class="sub">Sender tolke-lyd lokalt på wifi. Lyttere uten wifi faller automatisk til skyen (4G).</div>

    <label for="cloud">Sky-adresse</label>
    <input id="cloud" value="https://translate.sundaysuite.app" spellcheck="false" />

    <label for="pairing">Paringskode</label>
    <input id="pairing" placeholder="fra administrator" autocomplete="off" />

    <label for="op">Operatør-lenke</label>
    <input id="op" placeholder="https://translate.sundaysuite.app/o/…#…" spellcheck="false" />
    <div class="hint" id="parsed">Lim inn operatør-lenken (inneholder økt-id + hemmelighet).</div>

    <div class="row">
      <button class="start" id="startBtn">Start lokal relay</button>
      <button class="stop" id="stopBtn" disabled>Stopp</button>
    </div>
    <div class="err" id="err"></div>

    <div class="card">
      <div class="pill"><span class="dot" id="dot"></span><span id="statusText">Ikke i gang</span></div>
      <div class="kv" id="hostRow" style="display:none"><span>Vert</span><b id="host"></b></div>
      <div class="kv" id="urlRow" style="display:none"><span>Relay-URL</span><b id="url"></b></div>
      <div class="kv" id="sessRow" style="display:none"><span>Økt</span><b id="sess"></b></div>
    </div>

    <script>
      const invoke = window.__TAURI__.core.invoke;
      const $ = (id) => document.getElementById(id);

      function parseOp(url) {
        try {
          const u = new URL(url.trim());
          const secret = (u.hash || "").replace(/^#/, "");
          // /o/<id> or /tolk|kilde/<pin>; the operator link carries the session id.
          const m = u.pathname.match(/\/o\/([^/?#]+)/);
          const id = m ? m[1] : null;
          return id && secret ? { id, secret } : null;
        } catch {
          return null;
        }
      }

      function refreshParsed() {
        const p = parseOp($("op").value);
        $("parsed").textContent = p
          ? `Økt-id ${p.id.slice(0, 8)}… + hemmelighet funnet ✓`
          : "Lim inn operatør-lenken (inneholder økt-id + hemmelighet).";
      }
      $("op").addEventListener("input", refreshParsed);

      function render(s) {
        const on = !!s.running;
        $("dot").classList.toggle("on", on);
        $("statusText").textContent = on ? "Kjører — lokal lyd aktiv" : "Ikke i gang";
        $("startBtn").disabled = on;
        $("stopBtn").disabled = !on;
        for (const [row, val, el] of [
          ["hostRow", s.host, "host"],
          ["urlRow", s.relay_url, "url"],
          ["sessRow", s.session_id, "sess"],
        ]) {
          $(row).style.display = on && val ? "flex" : "none";
          if (val) $(el).textContent = el === "sess" ? String(val).slice(0, 8) + "…" : val;
        }
      }

      $("startBtn").addEventListener("click", async () => {
        $("err").textContent = "";
        const p = parseOp($("op").value);
        if (!p) { $("err").textContent = "Ugyldig operatør-lenke (mangler økt-id eller #hemmelighet)."; return; }
        if (!$("pairing").value.trim()) { $("err").textContent = "Paringskode mangler."; return; }
        $("startBtn").disabled = true;
        $("statusText").textContent = "Kobler til …";
        try {
          const s = await invoke("start_relay", {
            args: {
              cloud_base: $("cloud").value.trim(),
              pairing_code: $("pairing").value.trim(),
              session_id: p.id,
              session_secret: p.secret,
            },
          });
          render(s);
        } catch (e) {
          $("err").textContent = "Kunne ikke starte: " + e;
          $("startBtn").disabled = false;
          $("statusText").textContent = "Ikke i gang";
        }
      });

      $("stopBtn").addEventListener("click", async () => {
        $("err").textContent = "";
        try { render(await invoke("stop_relay")); }
        catch (e) { $("err").textContent = "Feil ved stopp: " + e; }
      });

      invoke("relay_status").then(render).catch(() => {});
      refreshParsed();
    </script>
  </body>
</html>
